services:
  app:
    build: .
    ports:
      - "${OPENCODE_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./.vault:/vault

  webapp:
    image: node:22-trixie-slim
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm run dev"
    ports:
      - "${WEBAPP_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./webapp:/app
      - webapp_node_modules:/app/node_modules
    depends_on:
      - app

volumes:
  webapp_node_modules:
